<!DOCTYPE html>
<html>
<header>
  <script>
    class LoopButton extends HTMLElement {
      constructor() {
        super();
        const shadow = this.attachShadow({ mode: 'open' });
        
        const btn = document.createElement('button');
        btn.textContent = this.getAttribute('label') || 'Default';
        btn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 1l4 4-4 4"></path>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
            <path d="M7 23l-4-4 4-4"></path>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
          </svg>
        `;
        btn.addEventListener('click', () => {
          btn.classList.toggle('is-active');
        });

        const style = document.createElement('style');
        style.textContent = `
          button {
            width: fit-content;
            aspect-ratio: 1 / 1;
            border-radius: 50%;

            margin: 2%;
            background: #1e293b;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 0 #0f172a; /* A solid "bottom" to give it height */
            transition: all 0.1s ease;
            cursor: pointer;

            &.is-active {
              transform: translateY(3px); /* Moves the button down */
              /* Pressed-in look */
              box-shadow: inset 4px 4px 8px #000, 
                          inset -4px -4px 8px #333;
              border-color: #3b82f6; /* Optional: glow color to show it's "On" */
            }
          }
          svg {
            transition: transform 0.5s ease-in;
            transform-origin: center;

            &:hover {
              transform: rotate(360deg);
            }
          }
        `;
        
        shadow.appendChild(style);
        shadow.appendChild(btn);
      }
    }
    customElements.define('loop-btn', LoopButton);
  </script>
</header>
<body style="width: 200px; padding: 10px; background-color: grey;">
  <h2>Dev Playground</h2>
  <loop-btn></loop-btn>
</body>
</html>
