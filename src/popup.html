<!DOCTYPE html>
<html>
<header>
  <style>
    body {
      width: 250px; 
      padding: 5px;

      /* A deep, desaturated blue-grey with 75% opacity */
      background: rgba(15, 23, 42, 0.75); 
      
      /* The "Glass" magic: blurs whatever is behind the popup */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); /* For Chrome compatibility */
      
      /* A very thin, subtle white border to define the edges */
      border: 1px solid rgba(255, 255, 255, 0.1);
      
      /* Soft outer glow to separate it from the webpage */
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      
      /* Rounded corners feel more modern/premium */
      border-radius: 12px;
      
      /* Padding and sizing */
      color: #e2e8f0; /* Light grey text for better readability on dark glass */
    }
    section:first-of-type {
      display: flex;
      flex: 1;
    }
    h2 {
      color: white;
      text-shadow:
      -1px -1px 0 #000,
      1px -1px 0 #000,
      -1px 1px 0 #000,
      1px 1px 0 #000;  
    }
  </style>
  <script src="components/loop-button.js"></script>
  <script src="components/reset-button.js"></script>
  <script src="components/keyboard-button.js"></script>
  <script src="components/loop-bound-side.js"></script>
  <script src="components/key-hint.js"></script>
</header>
<body>
  <section>
    <reset-button id="reset-btn"><key-hint command-name="reset-loop-bounds"></key-hint></reset-button>
    <pre>&nbsp;</pre>
    <h2>TrimLoop</h2>
    <pre>&nbsp;</pre>
    <loop-button id="loop-btn"><key-hint command-name="toggle-loop"></key-hint></loop-button>
    <pre>&nbsp;</pre>
    <keyboard-button id="keyboard-btn"></keyboard-button>
  </section>
  <section>
    <loop-bound-side id="lba"><key-hint command-name="set-start"></key-hint></loop-bound-side>
    <loop-bound-side id="lbb"><key-hint command-name="set-end"></key-hint></loop-bound-side>
  </section>
  <script src="popup.js"></script>
</body>
</html>
