<html>
<head>
  <meta name="viewport" content="width=device-width">
</head>
<body style="background-color: grey;">
  <section style="width: 100%; max-height: 80vh; display: grid; grid-template-columns: 1fr 1fr; ">
    <video controls="" autoplay="" name="media" style="object-fit: contain; width: 100%; height: 80vh; justify-self: center; align-self: center; background-color: black;">
      <source src="./test.mp4" type="video/mp4">
    </video>
    <div style="width: 100%; height: 80vh; ; display: flex; justify-content: center; align-items: center;">
      <iframe src="../src/popup.html" sandbox="allow-scripts allow-same-origin" style="min-height: 40vh; min-width: 40vw; border: 10px solid black;"></iframe>
    </div>
  </section>
  <section style="width: 100%; height: 20%; border: 10px solid black;">
    <pre style="width: 100%; height: 20vh;"></pre>
  </section>
  <script>
    chrome.storage = {
      local: {
        async get(key) { return {} },
      },
    };
    chrome.runtime = {
      onMessage: {
        addListener: (func) => {
          window.addEventListener("message", (event) => func(event.data, null, function sendResponse(response) { event.source.postMessage(response, "*"); }));
        },
      },
      sendMessage: (message) => {},
    };
  </script>
  <script src="../src/content.js"></script>
  <script type="module">
    /** @type {HTMLVideoElement} */
    const video = await (async function ensureVideoReady(timeout = 10000) {
      const vid = document.querySelector('video');
      if (!vid) throw new Error("No video found in the document.");

      const startTime = Date.now();
      while (Date.now() - startTime < timeout) {
          if (vid.readyState >= HTMLMediaElement.HAVE_FUTURE_DATA) 
              return vid;
          
          await new Promise(resolve => setTimeout(resolve, 500)); // sleep 500ms
      }
      throw new Error("Video load timed out.");
    })();
    video.muted = true; // abide chrome's Autoplay Policy
    async function loop(start, end) { 
      await window.postMessage({ action: "UPDATE_LOOP_BOUND", details: { mode: 'set', lb: { start, end } } });
      if (!video.paused) await window.postMessage({ action: "TOGGLE_LOOP" });
      await window.postMessage({ action: "TOGGLE_LOOP" });
    }
    function stopLoop() { if (!video.paused) window.postMessage({ action: "TOGGLE_LOOP" }); }
    const display = document.querySelector('pre');
    if (!display) throw new Error("No display found in the document.");
    function displayAppendLine(line) { display.innerText += "\n" + line; }
    function fail(message) {  
      displayAppendLine(`FAIL: ${message}`);
      throw Error(message);
    }
    function testToText(test) {
      return JSON.stringify(test, (key, value) => typeof value === 'function' ? `${value.toString()}` : value ); 
    }
    const lag = 0.15;
    const tests = [
      { action: () => loop(0, 1), duration: 0.75+lag, check: () => video.currentTime >= 0.75 && !video.paused },
      { action: () => loop(5, 7), duration: 1.75+lag, check: () => video.currentTime >= 6.75 },
      { action: () => stopLoop(), duration: lag, check: () => video.paused },
      { action: () => loop(2, 5), duration: 2+lag, check: () => video.currentTime >= 4 && !video.paused },
      { action: () => loop(7, video.duration), duration: 0.39+lag, check: () => video.currentTime < 7+lag && !video.paused },
      { action: () => stopLoop(), duration: lag, check: () => video.paused },
    ];
    for (const test of tests) {
      displayAppendLine(`Running test: ${testToText(test)}`);
      test.action();
      await new Promise(resolve => setTimeout(resolve, test.duration * 1000));
      if (!test.check()) fail(`Test failed! t:${video.currentTime} d:${test.duration}}`);
    }
    displayAppendLine("All tests passed!");
  </script>
</body>
</html>
